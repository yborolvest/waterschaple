# NL: Aanbevolen Coolify-deploy: expliciete Traefik-poort / EN: Recommended Coolify deploy with explicit Traefik port
# Build pack in Coolify: Docker Compose (niet alleen Dockerfile)
# Domein in Coolify: https://rijkdle.nl:3000

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.services.app.loadbalancer.server.port=3000
